<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Renderer</title>
  <script>
    window.RENDER_DATA = {};
    window.RENDER_FINISHED = false;
    window.updateRenderData = (data) => {
      window.RENDER_FINISHED = false;
      window.RENDER_DATA = data;
      window.dispatchEvent(new CustomEvent('render-data-updated', { detail: data }));

      // Wait for rendering to settle
      // Start with a minimum delay to let Vue render
      setTimeout(() => {
        let start = Date.now();
        const check = () => {
          const container = document.getElementById('main-container');
          // If no container yet, keep waiting
          if (!container) {
            if (Date.now() - start > 10000) {
              window.RENDER_FINISHED = true;
              return;
            }
            setTimeout(check, 100);
            return;
          }

          const imgs = document.querySelectorAll('img');
          // Check if all images are complete (loaded or errored)
          const allLoaded = imgs.length === 0 || Array.from(imgs).every(img => img.complete);

          if (allLoaded || (Date.now() - start > 10000)) {
            // Extra delay for layout/paint (200ms)
            setTimeout(() => { window.RENDER_FINISHED = true; }, 200);
          } else {
            setTimeout(check, 100);
          }
        };
        check();
      }, 300);  // Minimum 300ms for Vue to render
    };
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
