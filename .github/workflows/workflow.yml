name: Publish hyw to PyPI

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml
      - .github/workflows/workflow.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.release.outputs.should_publish }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide whether to publish
        id: release
        run: |
          python - <<'PY'
          import os
          import subprocess
          import tomllib
          import urllib.error
          import urllib.request
          from pathlib import Path

          project_name = "hyw"
          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = str(pyproject["project"]["version"]).strip()
          event_name = str(os.environ.get("GITHUB_EVENT_NAME") or "").strip()

          version_changed = event_name == "workflow_dispatch"
          previous_version = ""

          if not version_changed:
              try:
                  previous_text = subprocess.check_output(
                      ["git", "show", "HEAD^:pyproject.toml"],
                      text=True,
                  )
                  previous_version = str(
                      tomllib.loads(previous_text)["project"]["version"]
                  ).strip()
                  version_changed = previous_version != version
              except Exception:
                  version_changed = True

          already_published = False
          try:
              with urllib.request.urlopen(
                  f"https://pypi.org/pypi/{project_name}/{version}/json",
                  timeout=10,
              ) as response:
                  already_published = response.status == 200
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          should_publish = bool(version) and version_changed and not already_published

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"previous_version={previous_version}\n")
              fh.write(f"version_changed={'true' if version_changed else 'false'}\n")
              fh.write(f"already_published={'true' if already_published else 'false'}\n")
              fh.write(f"should_publish={'true' if should_publish else 'false'}\n")
          PY

  build:
    runs-on: ubuntu-latest
    needs: detect-release
    if: needs.detect-release.outputs.should_publish == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build distribution artifacts
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs:
      - detect-release
      - build
    if: needs.detect-release.outputs.should_publish == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
