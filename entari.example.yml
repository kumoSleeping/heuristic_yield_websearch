# $schema: entari.schema.json
basic:
  ignore_self_message: true
  log:
    level: info
  prefix:
    - /
  external_dirs:
    - .
  schema: true

plugins:
  .record_message: {}
  .commands:
    use_config_prefix: false
  entari_plugin_hyw:
    question_command: ".q"
    verbose: false  # false: immediately send "Thinking..." then only final reply; true: stream round notices as before
    render_theme: "paper"  # available: paper | github-light | github-dark | solarized-light | graphite
  ::inspect: {}
  entari_plugin_server:
    direct_adapter: true
    adapters:
      - $path: "@console"
